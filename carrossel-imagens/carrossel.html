<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carrossel de Imagens</title>
  <link rel="stylesheet" href="carrossel.css" />
</head>
<body>
  <div class="carousel">
    <h1>Carrossel de Imagens</h1>
    <div class="slides" id="slides">
      <!-- As imagens serão adicionadas via JavaScript -->
    </div>
    <div class="controls">
      <button onclick="prevSlide()">⬅️ Anterior</button>
      <button onclick="nextSlide()">Próximo ➡️</button>
    </div>
    <div class="dots" id="dots">
      <!-- Pontos de navegação -->
    </div>
  </div>
   <div class="back-to-portfolio">
    <p><a href="../index.html">Voltar para o Portfólio</a></p>
  </div>
  <script src="carrossel.js"></script>
</body>
</html>
