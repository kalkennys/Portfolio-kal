<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Conversor de Temperatura</title>
  <link rel="stylesheet" href="conversor.css" />
</head>
<body>
  <div class="converter">
    <h1>Conversor de Temperatura</h1>
    <div class="input-group">
      <label>Valor:</label>
      <input type="number" id="temp" placeholder="Digite a temperatura" />
    </div>
    <div class="select-group">
      <label>De:</label>
      <select id="from">
        <option value="celsius">Celsius (°C)</option>
        <option value="fahrenheit">Fahrenheit (°F)</option>
        <option value="kelvin">Kelvin (K)</option>
      </select>
      <label>Para:</label>
      <select id="to">
        <option value="fahrenheit">Fahrenheit (°F)</option>
        <option value="celsius">Celsius (°C)</option>
        <option value="kelvin">Kelvin (K)</option>
      </select>
    </div>
    <button onclick="convert()">Converter</button>
    <div class="result" id="result">Resultado aparecerá aqui</div>
  </div>
  <div class="back-to-portfolio">
    <p><a href="../index.html">Voltar para o Portfólio</a></p>
  </div>
  <script src="conversor.js"></script>
</body>
</html>
