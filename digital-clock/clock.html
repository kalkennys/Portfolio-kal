<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Um relógio digital simples desenvolvido com HTML, CSS e JavaScript. Com modo escuro, formato 12h/24h e exibição de data.">
  <meta name="keywords" content="relógio digital, javascript, html, css, web design">
  <meta name="author" content="Kalkennys">
  <title>Relógio Digital - Meu Portfólio</title>

</head>
<body>
  <!-- Link de Voltar -->
  <div class="back-to-portfolio">
    <a href="../index.html">← Voltar ao Portfólio</a>

  <!-- Botão de Tema -->
  <button id="theme-toggle">🌓 Modo Escuro</button>
