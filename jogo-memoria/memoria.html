<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Jogo da Memória desenvolvido com HTML, CSS e JavaScript. Teste sua memória combinando pares de cartas.">
  <meta name="keywords" content="jogo da memória, html, css, javascript, web game">
  <meta name="author" content="Kalkennys">
  <title>Jogo da Memória - Meu Portfólio</title>
  <link rel="stylesheet" href="memoria.css" />
</head>
<body>
  <!-- Botão de Tema -->
  <button id="theme-toggle">🌓 Modo Escuro</button>

  <!-- Link de Voltar -->
  <div class="back-to-portfolio">
    <a href="../index.html">← Voltar ao Portfólio</a>
  </div>

  <h1>🃏 Jogo da Memória</h1>
  <div class="stats">
    <p>Movimentos: <span id="moves">0</span></p>
    <p>Tempo: <span id="time">0</span>s</p>
  </div>
  <div class="grid" id="grid"></div>
  <button id="restart-button">🔄 Reiniciar Jogo</button>

  <!-- Tela de Vitória -->
  <div id="victory-screen" class="hidden">
    <div class="victory-content">
      <h2>🎉 Parabéns!</h2>
      <p>Você completou o jogo em <strong><span id="final-moves">0</span></strong> movimentos e <strong><span id="final-time">0</span></strong> segundos!</p>
      <button id="close-victory">Jogar Novamente</button>
    </div>
  </div>

  <script src="memoria.js"></script>
</body>
</html>
